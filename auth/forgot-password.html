<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reset Password — VARKONIS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#09090f;--s1:#0f0f18;--s2:#141420;--s3:#1a1a2a;--bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.13);--t:#fff;--t2:rgba(255,255,255,.58);--t3:rgba(255,255,255,.3);--a:#4f6ef7;--a2:#7b94ff;--g:#1fcfa0;--r:#f75a5a;--ease:cubic-bezier(.16,1,.3,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:3rem;overflow:hidden}
a{text-decoration:none;color:inherit}
.wrap{width:100%;max-width:520px;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:2.2rem;position:relative;overflow:hidden}
.wrap::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(79,110,247,.16),transparent 65%);top:-260px;right:-220px;pointer-events:none}
.logo{display:flex;align-items:center;gap:.55rem;font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;letter-spacing:.06em;margin-bottom:1.3rem}
.logo-ico{width:26px;height:26px;background:var(--a);display:grid;place-items:center;font-size:.65rem;font-weight:900;clip-path:polygon(50% 0%,100% 50%,50% 100%,0 50%)}
h1{font-family:'Syne',sans-serif;font-size:1.9rem;letter-spacing:-.02em;margin-bottom:.6rem}
.copy{color:var(--t2);line-height:1.7;margin-bottom:1.6rem;font-size:.92rem}
.fg{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.1rem}
.fl{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.fi{background:var(--s2);border:1px solid var(--bdr);border-radius:4px;padding:.85rem .95rem;font-size:.92rem;color:var(--t);outline:none;transition:border-color .2s,background .2s}
.fi:focus{border-color:var(--a);background:var(--s3)}
.btn{width:100%;padding:.95rem;border-radius:5px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.05em;background:var(--a);color:#fff;border:none;cursor:pointer;transition:background .2s,transform .2s,box-shadow .2s}
.btn:hover{background:var(--a2);transform:translateY(-1px);box-shadow:0 10px 26px rgba(79,110,247,.35)}
.msg{display:none;margin-top:1rem;font-size:.85rem;padding:.75rem .9rem;border-radius:5px}
.msg.ok{background:rgba(31,207,160,.12);border:1px solid rgba(31,207,160,.35);color:var(--g)}
.msg.err{background:rgba(247,90,90,.12);border:1px solid rgba(247,90,90,.35);color:var(--r)}
.links{display:flex;justify-content:space-between;align-items:center;margin-top:1.6rem;font-size:.82rem;color:var(--t2)}
.links a{color:var(--a2)}
@media(max-width:640px){body{padding:1.5rem}.wrap{padding:1.7rem}}
</style>
</head>
<body>
  <div class="wrap">
    <a class="logo" href="index.html"><div class="logo-ico">V</div>VARKONIS</a>
    <h1>Reset your password</h1>
    <p class="copy">Enter your email and we’ll send a secure reset link. On the live site this is handled by Supabase Auth; in this static preview we simulate the flow.</p>
    <div class="fg">
      <label class="fl">Email</label>
      <input class="fi" type="email" id="email" placeholder="you@email.com"/>
    </div>
    <button class="btn" id="btn">Send reset link</button>
    <div class="msg ok" id="ok">Reset link sent. Check your inbox.</div>
    <div class="msg err" id="err">Please enter a valid email.</div>
    <div class="links"><a href="https://varkonis-auth.vercel.app/login">Back to sign in</a><a href="contact.html">Need help?</a></div>
  </div>
<script>
  window.SUPABASE_URL="https://xvtnnszvfbirixppbdtl.supabase.co";
  window.SUPABASE_ANON_KEY="sb_publishable_pQJ3E0t7j34sImItSqxn6Q_jLBGuasq";
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(()=> {
  const email=document.getElementById('email');
  const btn=document.getElementById('btn');
  const ok=document.getElementById('ok');
  const err=document.getElementById('err');
  const SUPA_URL=window.SUPABASE_URL||'';
  const SUPA_KEY=window.SUPABASE_ANON_KEY||'';
  const supa=(SUPA_URL&&SUPA_KEY)?supabase.createClient(SUPA_URL,SUPA_KEY):null;

  function show(el){el.style.display='block';}
  function hideAll(){ok.style.display='none';err.style.display='none';}

  async function handle(){
    hideAll();
    const e=email.value.trim();
    const looksValid=/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(e);
    if(!looksValid){show(err);return;}
    btn.disabled=true;btn.textContent='Sending…';
    if(supa){
      try{
        const {error}=await supa.auth.resetPasswordForEmail(e,{redirectTo:location.origin+'/login.html'});
        if(error) throw error;
        show(ok);
      }catch(ex){err.textContent=ex.message||'Could not send reset link.';show(err);}
      btn.disabled=false;btn.textContent='Send reset link';return;
    }
    setTimeout(()=>{show(ok);btn.disabled=false;btn.textContent='Send reset link';},500);
  }
  btn.addEventListener('click',handle);
  email.addEventListener('keydown',ev=>{if(ev.key==='Enter')handle();});
})();
</script>
</body>
</html>
