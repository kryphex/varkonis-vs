kind = "web"
previewPath = "/"
title = "Varkonis — Financial Intelligence Platform"
version = "1.0.0"
id = "artifacts/varkonis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20441
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/varkonis run dev"

[services.env]
PORT = "20441"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/varkonis", "run", "build"]
publicDir = "artifacts/varkonis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
